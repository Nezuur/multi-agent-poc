---
services:
  web:
    image: python:3.11-slim
    container_name: django_poc
    working_dir: /app
    volumes:
      - ../app:/app
    command: >
      bash -c "pip install -r requirements.txt &&
               python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx_poc
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - web
    restart: unless-stopped

  orchestrator:
    build:
      context: ../
      dockerfile: deploy/Dockerfile.orchestrator
    container_name: orchestrator_poc
    volumes:
      - ../:/workspace  # Mounts the whole repo (git, app, prompts)
    environment:
      - DJANGO_WORKSPACE_DIR=/workspace/app
      - PROMPTS_DIR=/workspace/prompts
    env_file:
      - ../.env
    ports:
      - "8501:8501"
    restart: unless-stopped
